<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>(function(){try{var t=localStorage.getItem("auraline:v1:theme");document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
    <title>Новый пароль · Jewerly of Soul</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#06060A">
    <meta name="robots" content="noindex">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Jewerly of Soul">
    <meta property="og:title" content="Новый пароль · Jewerly of Soul">
    <meta property="og:description" content="Установка нового пароля для аккаунта Jewerly of Soul.">
    <meta property="og:locale" content="ru_RU">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/atmosphere.css">
    <link rel="stylesheet" href="styles/pages/auth.css">
</head>
<body data-page="reset-password" data-atmosphere>

    <header id="siteHeader"></header>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card" data-reveal>
                <p class="eyebrow">новый пароль</p>
                <h1 class="h-2">Задайте новый пароль.</h1>
                <p class="lead">Придумайте новый пароль для входа в аккаунт.</p>

                <form id="resetForm" class="auth-form" novalidate>
                    <div>
                        <label class="field-label" for="password">Новый пароль</label>
                        <input class="field" type="password" id="password" name="password" required autocomplete="new-password" placeholder="не короче 6 символов">
                    </div>
                    <div>
                        <label class="field-label" for="password2">Повторите пароль</label>
                        <input class="field" type="password" id="password2" name="password2" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn--primary btn--block">Сохранить пароль</button>
                    <p class="auth-form__alt">
                        <a href="login.html" class="accent">Вернуться ко входу.</a>
                    </p>
                </form>

                <div id="resetDone" class="auth-form" hidden>
                    <p class="lead" style="margin-top:8px">
                        Пароль обновлён. Теперь войдите с новым паролем.
                    </p>
                    <p class="auth-form__alt">
                        <a href="login.html" class="accent">Перейти ко входу.</a>
                    </p>
                </div>

                <div id="resetBad" class="auth-form" hidden>
                    <p class="lead" style="margin-top:8px">
                        Ссылка восстановления недействительна или устарела.
                        Запросите восстановление пароля заново.
                    </p>
                    <p class="auth-form__alt">
                        <a href="forgot-password.html" class="accent">Запросить ссылку заново.</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer id="siteFooter"></footer>

    <script type="module" src="js/ui/layout.js"></script>
    <script type="module" src="js/pages/reset-password.js"></script>
</body>
</html>
